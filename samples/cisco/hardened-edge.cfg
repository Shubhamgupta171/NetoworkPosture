! Cisco IOS configuration — hardened reference
!
hostname edge-router-02
!
service password-encryption
no service tcp-small-servers
no service udp-small-servers
no ip http server
no ip http secure-server
!
snmp-server community Pr0m3th3uS-RO RO
snmp-server group MGMT v3 priv
snmp-server host 10.10.0.50 version 3 priv MGMT
!
line con 0
 exec-timeout 5 0
 login local
line vty 0 4
 access-class MGMT-IN in
 transport input ssh
 exec-timeout 5 0
 login local
line vty 5 15
 access-class MGMT-IN in
 transport input ssh
 exec-timeout 5 0
 login local
!
ip access-list standard MGMT-IN
 permit 10.10.0.0 0.0.0.255
 deny any log
!
ip access-list extended OUTSIDE-IN
 permit tcp any any eq 443
 deny ip any any log
!
interface GigabitEthernet0/0
 description Public uplink
 ip address dhcp
 ip access-group OUTSIDE-IN in
!
logging host 10.10.0.50
logging trap informational
logging source-interface GigabitEthernet0/1
!
end
